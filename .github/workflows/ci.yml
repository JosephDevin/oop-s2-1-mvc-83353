name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore CommunityLibrary.sln

      - name: Build (Release)
        run: dotnet build CommunityLibrary.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test CommunityLibrary.sln --configuration Release --no-build --verbosity normal
